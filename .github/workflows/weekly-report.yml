name: weekly-report

on:
  schedule:
    - cron: '0 12 * * 6'      # Saturdays 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Build and send weekly report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cli.py weekly-report
      - name: Commit report
        run: |
          git config user.name "sentiment-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/out
          git commit -m "weekly report $(date -u +%F)" || echo "nothing to commit"
          git push || echo "nothing to push"
