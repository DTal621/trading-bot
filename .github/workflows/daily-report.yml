name: daily-report

# Runs after the US close. Reads the logs the instance synced to the repo, builds
# the daily report (with the LLM review), commits it, and pings Telegram.
# NOTE: Actions cron is best-effort (can be delayed under load) and is auto-disabled
# after ~60 days of repo inactivity — fine for reports, not for the live loop.
on:
  schedule:
    - cron: '0 22 * * *'      # 22:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Build and send daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # API-billed, not your plan
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cli.py daily-report
      - name: Commit report
        run: |
          git config user.name "sentiment-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/out
          git commit -m "daily report $(date -u +%F)" || echo "nothing to commit"
          git push || echo "nothing to push"
